<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job03</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <header>
        <nav class="bg-pink-600 text-white">
            <div class="flex justify-around items-center">
                <a href="#" class="text-3xl">DRAMALIST</a>
                <ul class="flex">
                    <li class="p-6"><a href="index.html">Accueil</a></li>
                    <li class="p-6"><a href="index.html">Inscription</a></li>
                    <li class="p-6"><a href="index.html">Connexion</a></li>
                    <li class="p-6"><a href="index.html">Rechercher</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main class="bg-pink-400">
        <section>
            <form action="">
                <div>
                    <input type="radio" id="femme" name="femme" value="femme" />
                    <label for="femme">Femme</label>

                    <input type="radio" id="homme" name="homme" value="homme" />
                    <label for="homme">Homme</label>

                    <input type="radio" id="autre" name="autre" value="autre" />
                    <label for="autre">Autre</label>
                </div>
                <div>
                    <label for="prenom">Prénom</label>
                    <input type="text" id="prenom" name="prenom" />
                </div>
                <div>
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" name="nom" />
                </div>
                <div>
                    <label for="adresse">Adresse</label>
                    <input type="text" id="adresse" name="adresse" />
                </div>
                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" />
                </div>
                <div>
                    <label for="password">Mot de passe</label>
                    <input type="text" id="password" name="password" />
                </div>
                <div>
                    <label for="confirm-password">Confirmation du mot de passe</label>
                    <input type="text" id="confirm-password" name="confirm-password" />
                </div>
                <legend>Quelles sont vos passions ?</legend>
                <div>
                    <input type="checkbox" id="informatique" name="informatique" value="informatique" />
                    <label for="informatique">Informatique</label>
                </div>
                <div>
                    <input type="checkbox" id="voyage" name="voyage" value="voyage" />
                    <label for="voyage">Voyage</label>
                </div>
                <div>
                    <input type="checkbox" id="série" name="série" value="série" />
                    <label for="série">Série</label>
                </div>
                <div>
                    <input type="checkbox" id="lecture" name="lecture" value="lecture" />
                    <label for="lecture">Lecture</label>
                </div>
            <button type="valider">Valider le formulaire</button>
            </form>
        </section>
    </main>
    <footer class="bg-pink-400 flex justify-around items-center text-white">
        <p class="text-2xl">© 2026 Copyright Text</p>
    </footer>
</body>
</html>
