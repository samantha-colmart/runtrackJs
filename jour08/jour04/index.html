<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job04</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <script src="script.js" defer></script>
</head>

<body class="bg-pink-700 dark:bg-black-900 min-h-screen flex flex-col">
    <header>
        <nav class="bg-pink-900 text-white shadow-lg">
            <div class="flex justify-between items-center px-6 py-4">
                <h1 class="text-2xl font-bold flex items-center gap-2">
                    DRAMALIST
                </h1>
                <ul class="flex items-center gap-6">
                    <li><a href="#" class="hover:text-purple-400">Accueil</a></li>
                    <li><a href="#" class="hover:text-green-400">Inscription</a></li>
                    <li><a href="#" class="hover:text-blue-400">Connexion</a></li>
                    <li><a href="#" class="hover:text-yellow-400">Rechercher</a></li>
                    <li>
                        <button id="theme-toggle"
                            class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:scale-110 transition cursor-pointer">
                            <svg id="theme-icon"
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 24 24"
                                class="w-6 h-6 text-gray-700 dark:text-yellow-200"
                                fill="currentColor">
                                <path d="M12 3a9 9 0 1 0 9 9c0-.34-.02-.67-.06-1A7 7 0 0 1 12 3z"/>
                            </svg>
                        </button>
                    </li>
                </ul>
            </div>
        </nav>
    </header>
    <main class="flex-grow flex items-center justify-center px-4 py-10">
        <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8">
            <h2 class="text-2xl font-bold text-center text-pink-400 dark:text-pink-600 mb-6">Crée ton compte</h2>
            <form class="space-y-4">
                <div>
                    <span class="font-semibold text-gray-700 dark:text-gray-300">Genre</span>
                    <div class="flex gap-4 mt-2">
                        <label class="flex items-center gap-2">
                            <input type="radio" name="genre" class="accent-green-600">
                            <span class="text-gray-700 dark:text-gray-300">Femme</span>
                        </label>

                        <label class="flex items-center gap-2">
                            <input type="radio" name="genre" class="accent-green-600">
                            <span class="text-gray-700 dark:text-gray-300">Homme</span>
                        </label>

                        <label class="flex items-center gap-2">
                            <input type="radio" name="genre" class="accent-green-600">
                            <span class="text-gray-700 dark:text-gray-300">Autre</span>
                        </label>
                    </div>
                </div>
                <div>
                    <label class="text-sm text-gray-600 dark:text-gray-300">Prénom</label>
                    <div class="relative">
                        <div class="absolute left-3 top-2.5 text-gray-400 dark:text-gray-300">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                                <path stroke-linecap="round" stroke-linejoin="round" 
                                d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </div>
                        <input type="text" placeholder="Jean"
                            class="w-full pl-10 py-2 rounded-lg border border-gray-400 focus:ring-2 focus:ring-pink-600 dark:bg-gray-600 dark:border-gray-800 dark:text-white">
                    </div>
                </div>
                <div>
                    <label class="text-sm text-gray-600 dark:text-gray-300">Nom</label>
                    <div class="relative">
                        <div class="absolute left-3 top-2.5 text-gray-400 dark:text-gray-300">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                                <path stroke-linecap="round" stroke-linejoin="round" 
                                d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Zm6-10.125a1.875 1.875 0 1 1-3.75 0 1.875 1.875 0 0 1 3.75 0Zm1.294 6.336a6.721 6.721 0 0 1-3.17.789 6.721 6.721 0 0 1-3.168-.789 3.376 3.376 0 0 1 6.338 0Z" />
                            </svg>
                        </div>
                        <input type="text" placeholder="Dupont"
                            class="w-full pl-10 py-2 rounded-lg border border-gray-400 focus:ring-2 focus:ring-pink-600 dark:bg-gray-600 dark:border-gray-800 dark:text-white">
                </div>
                <div>
                    <label class="text-sm text-gray-600 dark:text-gray-300">Adresse</label>
                    <div class="relative">
                        <div class="absolute left-3 top-2.5 text-gray-400 dark:text-gray-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 21s-6-5.686-6-10a6 6 0 1112 0c0 4.314-6 10-6 10z" />
                            </svg>
                        </div>
                        <input type="text" placeholder="Adresse"
                            class="w-full pl-10 py-2 rounded-lg border border-gray-400 focus:ring-2 focus:ring-pink-600 dark:bg-gray-600 dark:border-gray-800 dark:text-white">
                    </div>
                </div>
                <div>
                    <label class="text-sm text-gray-600 dark:text-gray-300">Email</label>
                    <div class="relative">
                        <div class="absolute left-3 top-2.5 text-gray-400 dark:text-gray-300">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                                <path fill-rule="evenodd" d="M17.834 6.166a8.25 8.25 0 1 0 0 11.668.75.75 0 0 1 1.06 1.06c-3.807 3.808-9.98 3.808-13.788 0-3.808-3.807-3.808-9.98 0-13.788 3.807-3.808 9.98-3.808 13.788 0A9.722 9.722 0 0 1 21.75 12c0 .975-.296 1.887-.809 2.571-.514.685-1.28 1.179-2.191 1.179-.904 0-1.666-.487-2.18-1.164a5.25 5.25 0 1 1-.82-6.26V8.25a.75.75 0 0 1 1.5 0V12c0 .682.208 1.27.509 1.671.3.401.659.579.991.579.332 0 .69-.178.991-.579.3-.4.509-.99.509-1.671a8.222 8.222 0 0 0-2.416-5.834ZM15.75 12a3.75 3.75 0 1 0-7.5 0 3.75 3.75 0 0 0 7.5 0Z" clip-rule="evenodd" />
                            </svg>

                        </div>
                        <input type="email" placeholder="email@gmail.com"
                            class="w-full pl-10 py-2 rounded-lg border border-gray-400 focus:ring-2 focus:ring-pink-600 dark:bg-gray-600 dark:border-gray-800 dark:text-white">
                    </div>
                </div>
                <div>
                    <label class="text-sm text-gray-600 dark:text-gray-300">Mot de passe</label>
                    <div class="relative">
                        <div class="absolute left-3 top-2.5 text-gray-400 dark:text-gray-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 11c1.657 0 3-1.343 3-3V7a3 3 0 10-6 0v1c0 1.657 1.343 3 3 3z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M5 11h14v10H5z" />
                            </svg>
                        </div>
                        <input type="password" placeholder="••••••••"
                            class="w-full pl-10 py-2 rounded-lg border border-gray-400 focus:ring-2 focus:ring-pink-600 dark:bg-gray-600 dark:border-gray-800 dark:text-white">
                    </div>
                </div>
                <div>
                    <label class="text-sm text-gray-600 dark:text-gray-300">Confirmation</label>
                    <div class="relative">
                        <div class="absolute left-3 top-2.5 text-gray-400 dark:text-gray-300">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                                <path stroke-linecap="round" stroke-linejoin="round" 
                                d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" />
                            </svg>
                        </div>
                        <input type="password" placeholder="••••••••"
                            class="w-full pl-10 py-2 rounded-lg border border-gray-400 focus:ring-2 focus:ring-pink-600 dark:bg-gray-600 dark:border-gray-800 dark:text-white">
                    </div>
                </div>
                <div>
                    <span class="font-semibold text-gray-700 dark:text-gray-300">Passions</span>
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" class="accent-green-400">
                            <span class="dark:text-gray-300">Informatique</span>
                        </label>
                        <label class="flex items-center gap-2">
                            <input type="checkbox" class="accent-green-400">
                            <span class="dark:text-gray-300">Voyage</span>
                        </label>
                        <label class="flex items-center gap-2">
                            <input type="checkbox" class="accent-green-400">
                            <span class="dark:text-gray-300">Série</span>
                        </label>
                        <label class="flex items-center gap-2">
                            <input type="checkbox" class="accent-green-400">
                            <span class="dark:text-gray-300">Lecture</span>
                        </label>
                    </div>
                </div>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-400 text-white py-2 rounded-lg shadow-lg transition cursor-pointer">S'inscrire</button>
            </form>
        </div>
    </main>
    <footer class="bg-pink-800 text-white text-center py-4">
        <p>© 2026 DRAMALIST</p>
    </footer>
</body>
</html>
