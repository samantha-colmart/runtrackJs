<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <title>Job02</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
</head>
<body>
    <header>
        <nav class="rose">
            <div class="container">
                <a href="#" class="brand-logo">DRAMALIST</a>
                <ul id="nav-mobile" class="right hide-on-med-and-down">
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="index.html">Inscription</a></li>
                    <li><a href="index.html">Connexion</a></li>
                    <li><a href="index.html">Rechercher</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <section>
            <form action="">
                <div>
                    <input type="radio" id="femme" name="femme" value="femme" />
                    <label for="femme">Femme</label>

                    <input type="radio" id="homme" name="homme" value="homme" />
                    <label for="homme">Homme</label>

                    <input type="radio" id="autre" name="autre" value="autre" />
                    <label for="autre">Autre</label>
                </div>
                <div>
                    <label for="prenom">Prénom</label>
                    <input type="text" id="prenom" name="prenom" />
                </div>
                <div>
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" name="nom" />
                </div>
                <div>
                    <label for="adresse">Adresse</label>
                    <input type="text" id="adresse" name="adresse" />
                </div>
                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" />
                </div>
                <div>
                    <label for="password">Mot de passe</label>
                    <input type="text" id="password" name="password" />
                </div>
                <div>
                    <label for="confirm-password">Confirmation du mot de passe</label>
                    <input type="text" id="confirm-password" name="confirm-password" />
                </div>
                <legend>Quelles sont vos passions ?</legend>
                <div>
                    <input type="checkbox" id="informatique" name="informatique" value="informatique" />
                    <label for="informatique">Informatique</label>
                </div>
                <div>
                    <input type="checkbox" id="voyage" name="voyage" value="voyage" />
                    <label for="voyage">Voyage</label>
                </div>
                <div>
                    <input type="checkbox" id="sport" name="sport" value="sport" />
                    <label for="sport">Série</label>
                </div>
                <div>
                    <input type="checkbox" id="lecture" name="lecture" value="lecture" />
                    <label for="lecture">Lecture</label>
                </div>
            <button type="valider">Valider le formulaire</button>
            </form>
        </section>
    </main>
    <footer>
        <p>© 2026 Copyright Text</p>
    </footer>
