<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job04</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="pink">
            <div class="container">
                <a href="#" class="brand-logo">DRAMALIST</a>
                <ul id="nav-mobile" class="right hide-on-med-and-down">
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="index.html">Inscription</a></li>
                    <li><a href="index.html">Connexion</a></li>
                    <li><a href="index.html">Rechercher</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main class="red lighten-1">
        <section class="container mb-0">
            <div class="row mb-0" style="margin-bottom:0;">
                <form class="col s12 m10 offset-m1 l8 offset-l2 card-panel p-4" style="padding:24px;">
                    <div class="section">
                        <span class="blue-text text-darken-2">Genre</span>
                        <p>
                            <label>
                                <input name="genre" type="radio" />
                                <span>Femme</span>
                            </label>
                        </p>
                        <p>
                            <label>
                                <input name="genre" type="radio" />
                                <span>Homme</span>
                            </label>
                        </p>
                        <p>
                            <label>
                                <input name="genre" type="radio" />
                                <span>Autre</span>
                            </label>
                        </p>
                    </div>
                    <div class="row">
                        <div class="input-field col s12 m6">
                            <i class="material-icons prefix">person</i>
                            <input id="prenom" type="text">
                            <label for="prenom">Prénom</label>
                        </div>
                        <div class="input-field col s12 m6">
                            <i class="material-icons prefix">badge</i>
                            <input id="nom" type="text">
                            <label for="nom">Nom</label>
                        </div>
                    </div>
                    <div class="input-field">
                        <i class="material-icons prefix">home</i>
                        <input id="adresse" type="text">
                        <label for="adresse">Adresse</label>
                    </div>
                    <div class="input-field">
                        <i class="material-icons prefix">email</i>
                        <input id="email" type="email">
                        <label for="email">Email</label>
                    </div>
                    <div class="input-field">
                        <i class="material-icons prefix">lock</i>
                        <input id="password" type="password">
                        <label for="password">Mot de passe</label>
                    </div>
                    <div class="input-field">
                        <i class="material-icons prefix">lock_outline</i>
                        <input id="confirm-password" type="password">
                        <label for="confirm-password">Confirmation</label>
                    </div>
                    <div class="section">
                        <span class="grey-text text-darken-2">Passions</span>
                        <p>
                            <label>
                                <input type="checkbox" />
                                <span>Informatique</span>
                            </label>
                        </p>
                        <p>
                            <label>
                                <input type="checkbox" />
                                <span>Voyage</span>
                            </label>
                        </p>
                        <p>
                            <label>
                                <input type="checkbox" />
                                <span>Série</span>
                            </label>
                        </p>
                        <p>
                            <label>
                                <input type="checkbox" />
                                <span>Lecture</span>
                            </label>
                        </p>
                    </div>
                    <div class="center">
                        <button class="btn green" type="submit">
                            Valider
                            <i class="material-icons right">send</i>
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </main>
    <footer class="pink">
        <div class="container">
            <div class="row center valign-wrapper">
                <div class="col s6">
                    <h5 class="white-text">© 2026 Copyright Text</h5>
                </div>
                <div class="col s6">
                </div>
            </div>           
        </div>
    </footer>
</body>
</html>
