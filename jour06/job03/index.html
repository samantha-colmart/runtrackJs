<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job03</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <div class="container py-4">
        <div class="row g-2 mb-3">
            <div class="col-12 bg-info p-5"></div>
        </div>
        <div class="row g-2 mb-3">
            <div class="col-12 col-md-4">
                <div class="bg-primary p-5 h-100"></div>
            </div>
            <div class="col-6 col-md-4">
                <div class="bg-primary p-5 h-100"></div>
            </div>
            <div class="col-6 col-md-4">
                <div class="bg-primary p-5 h-100"></div>
            </div>

        </div>
        <div class="row g-2 mb-3 justify-content-center">
            <div class="col-6 col-md-4 order-1 order-md-2">
                <div class="bg-secondary p-5 h-100"></div>
            </div>
            <div class="col-10 col-md-8 order-2 order-md-1">
                <div class="bg-secondary p-5 h-100"></div>
            </div>

        </div>
        <div class="row g-5 align-items-md-start" style="height: 150px;">
            <div class="col-4 align-self-md-start">
                <div class="bg-warning p-3"></div>
            </div>
            <div class="col-4 align-self-md-center">
                <div class="bg-warning p-3"></div>
            </div>
            <div class="col-4 align-self-md-end">
                <div class="bg-warning p-3"></div>
            </div>
        </div>
    </div>

</html>
